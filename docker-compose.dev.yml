services:
  storage:
    image: redis
    volumes:
      - ./data:/data
  library:
    image: node:18.20
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - PORT=8080
      - REDIS_URL=redis://storage
      - COUNTER_SERVICE_URL=http://counter:3002
    ports:
      - "8080:8080"
    command: npm run dev
    depends_on:
      - storage
      - counter
  counter:
    image: node:18.20
    working_dir: /app
    volumes:
      - ./microservices/counter/:/app
    environment:
      - PORT=3002
      - REDIS_URL=redis://storage
    command: npm run dev
    depends_on:
      - storage

  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass